<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Inscripcion al curso</h1>
   <form id="myform">
     <label for="name">Nombre:</label>
     <input type="text" id="name" name="name">
     <label for="email">Correo Electrónico:</label>
     <input type="email" id="email" name="email">
     <label for="telefono">Telefono:</label>
     <input type="tel" id="telefono" name="telefono">

 <!-- Sección de Intereses -->
   <h3>Elige tus intereses:</h3>
    <label>
    <input type="checkbox" name="intereses" value="Programación"> Programación
    </label>
    <label>
    <input type="checkbox" name="intereses" value="Diseño"> Diseño
    </label>
    <label>
    <input type="checkbox" name="intereses" value="Marketing"> Marketing
    </label>

   <!-- Sección de fecha -->

   <h3>Selecciona una fecha:</h3>
    <label>Horario preferido:</label>
    <label><input type="radio" name="horario" value="mañana" required> Mañana</label>
    <label><input type="radio" name="horario" value="tarde"> Tarde</label>
    <label><input type="radio" name="horario" value="noche"> Noche</label>
   <label for="fecha">Fecha:</label>
   <input type="date" id="fecha" name="fecha">
   <label for="hora">Hora:</label>
   <input type="time" id="hora" name="hora">
    <br></br>
    
    <!-- Subida de Archivo -->
    <label for="archivo">Sube un archivo (INE):</label>
    <input type="file" id="archivo" name="archivo">
     <!-- Botón al final -->
        <div style="margin-top: 20px;">
            <button type="submit">Enviar Registro</button>
        </div>
</form>
  <!-- CORRECCIÓN: CDN correcto de SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Tu archivo JS -->
    <script src="1app.js"></script>
</body>
</html>
